version: '3.8'

services:
  workspace:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/workspaces/Biomed-GraphRAG
    command: /bin/sh -c "while sleep 1000; do :; done"
    network_mode: service:neo4j

  neo4j:
    image: neo4j:5.15.0
    restart: unless-stopped
    ports:
      - "7474:7474" # Neo4j Browser UI
      - "7687:7687" # Bolt protocol for Python connection
    environment:
      - NEO4J_AUTH=neo4j/biomed_password123
      - NEO4J_PLUGINS=["apoc"]
    
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333" # Qdrant API